# ──────────────────────────────────────
# Retrix - Add this block to your existing Caddyfile
# Location: D:\SelfHosted\caddy\Caddyfile
# After adding, reload: caddy reload --config D:\SelfHosted\caddy\Caddyfile
# ──────────────────────────────────────

retrix.rebitgames.com {
    # API requests → FastAPI backend
    handle /api/* {
        reverse_proxy localhost:8000
    }

    # WebSocket → FastAPI backend
    handle /ws {
        reverse_proxy localhost:8000
    }

    # Frontend static files (React build output)
    # NOTE: Update this path to your actual retrix install location
    handle {
        root * D:\Projects\retrix\frontend\dist
        file_server
        try_files {path} /index.html
    }
}
